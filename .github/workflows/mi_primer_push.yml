name: Mi primer Push

# Se activa de forma automática al hacer un push
on:
  push:

jobs:
  Tarea1:
    runs-on: ubuntu-22.04

    steps:
      - name: Informe de Datos del Push
        run: |
          echo "Autor: ${{ github.event.head_commit.author.name }}"
          echo "Mensaje: ${{ github.event.head_commit.message }}"
          echo "ID del Commit: ${{ github.event.head_commit.id }}"
          echo "URL del Commit: ${{ github.event.head_commit.url }}"
          echo "Rama/Ref: ${{ github.ref }}"
          echo "Repositorio: ${{ github.repository }}"
